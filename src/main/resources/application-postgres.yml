spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/mindjournal}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:mindjournal}
    password: ${DB_PASSWORD:mindjournal}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  h2:
    console:
      enabled: false
